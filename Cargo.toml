fuel-cpu-backend = { path = "./fuel-cpu-backend", version = "0.10.3" }
fuel-mkl-cpu-backend = { path = "./fuel-mkl-cpu-backend", version = "0.10.3" }
fuel-graph = { path = "./fuel-graph", version = "0.10.3" }
fuel-kernel-seam-announce = { path = "./fuel-kernel-seam-announce", version = "0.10.3" }
