# --- CUDA FFI layer: baracuda -----------------------------------------------
# Fuel depends on baracuda's sub-crates directly (not the `baracuda` umbrella)
# so feature flags stay explicit and transitive weight is minimal per consuming
# crate. All 46 baracuda crates are published on crates.io.
#
# alpha.4 added the `half-crate` feature on baracuda-cudnn (CudnnDataType
# impls for half::f16 / half::bf16), unblocking the f16/bf16 conv2d/conv1d
# paths in fuel-cuda-backend.
#
# alpha.5 fixes multi-CUDA cuDNN search-dir selection on Windows: with both
# CUDA 12.x and 13.x cuDNN bundles installed under
# `C:\Program Files\NVIDIA\CUDNN\v9.x\bin\<cuda_major>\`, the loader now
# picks the bundle whose major matches the running CUDA driver instead of
# whatever the filesystem happened to enumerate first. That bug bit Fuel's
# yolov8 anchor (it loaded the 12.9 cudnn_adv64_9.dll which delay-references
# cublasLt64_12.dll, which doesn't exist on a CUDA-13 install). Strict
# superset of alpha.4 — Linux + single-CUDA hosts unchanged.
#
# alpha.66 lands the `cuMemGetInfo` wrappers Fuel asked for so the CUDA
# backend can report device memory pressure back to the runtime selector:
# `baracuda_driver::mem_get_info() -> (free, total)` and the per-`Device`
# `vram_info` / `vram_free` / `vram_total` accessors. This unblocks step 2
# of the backend-contract v0.3 migration (`BackendRuntime for CudaDevice`,
# see docs/architecture/05-backend-contract.md §Current compliance).
#
# alpha.67 (Phase 74) answers docs/baracuda-ask-fp-gemm-reduce-to-2026-06-10.md:
# dense FP GEMM (`gemm_dense_{f32,f64,f16,bf16}_run`, cuBLAS-backed,
# RRR/RCR/CRR + flexible lds + strided batch) — retires Fuel's
# `matmul_via_cublas` residue. The reply also surfaced that
# `reduce_{sum,max}_to_*` has shipped at full 4-dtype coverage since
# alpha.46 (sys-only, invisible to the facade audit) — Fuel's f32-only
# reduce-to wrappers generalize against those.
#
# alpha.68 (2026-06-15) fixes the CUTLASS-kernel build under recent MSVC +
# CUDA 13.x: baracuda-cutlass-kernels-sys now passes `/Zc:preprocessor` to
# nvcc's host compiler so CUDA 13.3's CCCL headers stop hard-erroring on
# cl.exe's traditional preprocessor (the wall that blocked the A3b-1 live
# smoke). No Fuel-facing API change vs alpha.67.
#
# alpha.70 (2026-06-28) — Step E Phase B2 device-load telemetry: adds
# `Stream::is_complete()`/`is_idle()` (cuStreamQuery) + `baracuda-nvml`
# `Device::utilization()`/`gpu_utilization_percent()` (NVML, separate crate, not
# yet a Fuel dep — B2 wires it later). No breaking change to the surfaces Fuel
# consumes today; bumped for currency + to unblock B2.
#
# alpha.72 (2026-06-29) — Step E Phase A3 (CUDA async dispatch): `DeviceBuffer`
# allocated via `new_async` now frees STREAM-ORDERED on `Drop` (cuMemFreeAsync on
# the retained origin stream), and NEW `zeros_async(ctx,len,stream)` gives output
# buffers async alloc+zero+free. Sync constructors (new/zeros/from_slice) stay
# fully synchronous (no behavior change). Lets A3 drop the per-op
# `device.synchronize()` and pipeline on the per-device stream with no Fuel-side
# retention pool or executor lifetime guards. Use alpha.72 (alpha.71 had a Drop
# fallback hazard, fixed here). Answers docs/outreach/baracuda-stream-ordered-alloc-ask.md.
#
# KERNEL-SEAM STATUS (carried from the FKC branch, re-verified against the surface
# up to alpha.72): the published baracuda-* FFI surface (baracuda-kernels-sys + all
# baracuda-* crates) exposes NO `baracuda_seam_hello`, NO DLPack/DLTensor
# consumption, and NO JIT-on-request / runtime-fused-op-registration endpoint —
# i.e. the ratified Kernel-Seam (Profile v1) is NOT yet exposed by Baracuda.
# alpha.69+ ships the building blocks (baracuda-nvrtc runtime PTX compile,
# baracuda-forge build-time nvcc), but the seam surface (seam_hello + a
# DLPack-consuming kernel + the §5 JIT endpoint) must land in a later Baracuda
# version before the cross-FFI seam can be tested. Tracked in docs/specs/kernel-seam-interop.md §7.1.
#
# alpha.76 (2026-07-08) — bespoke NaN-PROPAGATING `relu` family in
# baracuda-kernels-sys: `baracuda_kernels_unary_relu_propagating_{f32,f64,f16,bf16}[_strided]_run`
# + matching `_can_implement` gates, same ABI/feature-gate (sm80/sm89/sm90a) as
# the incumbent NaN-scrubbing `unary_relu_*` family (which stays, for other
# consumers). Additive-only vs alpha.75 (verified via crates.io src diff —
# no signature changes elsewhere, only rustfmt reflow). Fuel rebinds
# `OpKind::ReluElementwise`'s CUDA path to the propagating family here,
# closing the CPU/CUDA NaN-convention divergence opened by 772e27a0.
#
# alpha.77 (2026-07-09) — the `_doff` device-resident-offset WriteSlice family
# in baracuda-kernels-sys: `baracuda_kernels_write_slice_b{1,2,4,8}_doff_run`
# (+ `_can_implement`), = the base `_run` plus `dyn_axis: i32` + `dyn_start_dev:
# *const i64` inserted right after `range_start`; the kernel reads
# `dyn_start_dev[0]` at entry as the dynamic axis's start, so the offset stays
# DEVICE-RESIDENT and survives CUDA-graph capture/replay (the CapturedRun decode
# lever). Additive-only vs alpha.76 (verified: 0 FFI symbols removed, 12 added;
# 173/173 live CUDA parity). The whole workspace moved to alpha.77 in lockstep
# (also carries kernelgen breadth: base_offset/where-select/hetero-dropout/
# argsort/topk/im2col — all off-key, no STRUCTURE_KEY_VERSION bump).
baracuda-types         = { version = "0.0.1-alpha.77", features = ["half-crate", "f8-crate"] }
baracuda-core          = { version = "0.0.1-alpha.77" }
baracuda-cuda-sys      = { version = "0.0.1-alpha.77" }
baracuda-driver        = { version = "0.0.1-alpha.77" }
baracuda-runtime       = { version = "0.0.1-alpha.77" }
baracuda-cublas-sys    = { version = "0.0.1-alpha.77" }
baracuda-cublas        = { version = "0.0.1-alpha.77" }
baracuda-cudnn-sys     = { version = "0.0.1-alpha.77" }
baracuda-cudnn         = { version = "0.0.1-alpha.77", features = ["half-crate"] }
baracuda-curand-sys    = { version = "0.0.1-alpha.77" }
baracuda-curand        = { version = "0.0.1-alpha.77" }
baracuda-nvrtc-sys     = { version = "0.0.1-alpha.77" }
baracuda-nvrtc         = { version = "0.0.1-alpha.77" }
# The live JIT synthesizer (BaracudaSynthesizer, the fuel-kernel-seam Synthesizer
# impl). EXACT pin: only the `seam` module surface is supported/stable — the
# generator internals are alpha-fluid, so never AUTO-upgrade. Deliberately bumped
# to alpha.77 in LOCKSTEP with the rest of the baracuda workspace (2026-07-09):
# baracuda-kernels-sys is a shared extern-C dep, so leaving kernelgen at alpha.76
# while the rest is alpha.77 would pull two kernels-sys versions and duplicate the
# FFI symbols. Pulled only under fuel-dispatch's `jit-synth` feature.
baracuda-kernelgen     = { version = "=0.0.1-alpha.77" }
baracuda-nccl-sys      = { version = "0.0.1-alpha.77" }
baracuda-nccl          = { version = "0.0.1-alpha.77", features = ["half-crate"] }
baracuda-cutlass       = { version = "0.0.1-alpha.77" }
# baracuda alpha.26 — new ML kernel facade. Fuel uses `baracuda-kernels-sys`
# (raw extern "C") rather than the safe `baracuda-kernels` Plan-based wrapper
# so each kernel becomes its own KernelRef in Fuel's binding table — the
# safe layer's Plan-cached dispatch isn't compatible with Fuel's
# per-decision-point alternatives composition.
baracuda-kernels-types = { version = "0.0.1-alpha.77" }
baracuda-kernels-sys   = { version = "0.0.1-alpha.77", features = [
    "cudnn",
    "sm89",
    # Phase 48 (Consolidation B) 4-bit weight-only GEMM families.
    "awq",
    "marlin",
    # Phase 53 bitsandbytes NF4 (NormalFloat 4-bit) dequant + GEMV.
    "bnb_nf4",
    # Phase 51 additive-mask SDPA + Phase 54 block-sparse + 2:4 sparsity
    # + Phase 56 ring attention all share the elementwise / attention
    # families that Fuel routes through baracuda — opt them in so the
    # primitives are linkable even if Op-surface wiring lands later.
    "xformers_blocksparse",
    "xformers_sparse24",
    "ring_attention",
    # Phase 47 fused linear cross-entropy (loss_flce_*) is NOT cargo-
    # gated; the symbols are always built. Same for sdpa_arbmask.
    # Phase 50 Mamba SSM (causal_conv1d + selective_scan + ssd_chunk_scan).
    "mamba",
    # Phase 46 FlashInfer (paged KV append/decode + sampling +
    # cascade LSE merge) — Fuel's inference path uses this.
    "flashinfer",
    # Phase 43 HyperConnection (mhc_layer_static) is exotic; left off
    # by default. Add "mhc" when a Fuel layer needs it.
    # Phase 42 + 59a + 59b + 60 FA2 — alpha.60 vendor closes the full
    # 9 head_dim set {32,64,96,128,160,192,224,256,512} for FW (BW
    # only covers the original 6 per VENDOR.md). Fuel-side flash_attn
    # launcher migrated off the upstream vendored FA2 onto baracuda's
    # `fa2_sdpa_*_run_v2` symbols. SD 1.5 hd40/hd80 paths still use
    # Fuel's standard-attention fallback (no FA2 path).
    "fa2",
] }
