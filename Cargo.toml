[profile.release-with-debug]
inherits = "release"
debug = true

# Unify the kernel-seam crates across the seam boundary. `baracuda-kernelgen`
# (crates.io, under fuel-dispatch's `jit-synth` feature) depends on the PUBLISHED
# fuel-kernel-seam / -types 0.10.3, while the workspace uses its own path members
# of the same crates — cargo treats path and registry as different sources, so
# without this patch there would be two incompatible copies and `BaracudaSynthesizer`
# would impl a `Synthesizer` trait distinct from the one fuel-dispatch calls. The
# members ARE the source that produced the published 0.10.3 (the envelope is frozen),
# so redirecting the registry deps to them is the correct unification. Inert unless
# `jit-synth` pulls kernelgen (no other crate depends on the registry seam crates).
[patch.crates-io]
fuel-kernel-seam = { path = "./fuel-kernel-seam" }
fuel-kernel-seam-types = { path = "./fuel-kernel-seam-types" }
