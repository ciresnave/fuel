[workspace]
# Every Fuel crate lives in the workspace so each one can inherit
# shared dep versions via `{ workspace = true }`. Crates that need
# heavy build toolchains (CUDA, Metal, Python, prost/ONNX) are kept
# off `default-members` so a plain `cargo build` / `cargo test`
# still works on machines that don't have those toolchains.
members = [
    "fuel-aocl-cpu-backend",
    "fuel-book",
    "fuel-conv",
    "fuel-core",
    "fuel-ir",
    "fuel-backend-contract",
    "fuel-cpu-kernels",
    "fuel-hardware",
    "fuel-cpu-backend",
    "fuel-mkl-cpu-backend",
    "fuel-cublaslt",
    "fuel-cuda-vmm",
    "fuel-datasets",
    "fuel-examples",
    "fuel-formats",
    "fuel-graph",
    "fuel-kernel-seam-announce",
    "fuel-kernel-seam-types",
    "fuel-kernel-seam",
    "fuel-cuda-backend",
    "fuel-dispatch",
    "fuel-vulkan-backend",
    "fuel-inference",
    "fuel-kernels-source",
    "fuel-vulkan-kernels",
    "fuel-lazy-examples",
    "fuel-metal-backend",
    "fuel-metal-kernels",
    "fuel-correctness-fixtures",
    "fuel-kiss-ref-backend",
    "fuel-onnx",
    "fuel-parallel",
    "fuel-pyo3",
    "fuel-quantized",
    "fuel-memory",
    "fuel-training",
    "fuel-transformers",
    "fuel-ug",
    "fuel-wasm-examples/*",
    "fuel-wasm-tests",
    "fuel-tensor-tools",
]
# What `cargo build`, `cargo check`, `cargo test` without `-p` or
# `--workspace` will actually build. Matches the pre-restructure
# `members` list — CUDA/Metal/ONNX/book crates require toolchains
# or platforms not every contributor has, so they're opt-in via
# `-p` or `--workspace`.
default-members = [
    "fuel-core",
    "fuel-ir",
    "fuel-backend-contract",
    "fuel-cpu-kernels",
    "fuel-hardware",
    "fuel-cpu-backend",
    "fuel-dispatch",
    "fuel-formats",
    "fuel-graph",
    "fuel-kernel-seam-announce",
    "fuel-kernel-seam-types",
    "fuel-cuda-backend",
    "fuel-vulkan-backend",
    "fuel-kernels-source",
    "fuel-vulkan-kernels",
    "fuel-lazy-examples",
    "fuel-memory",
    "fuel-metal-backend",
    "fuel-datasets",
    "fuel-examples",
    "fuel-inference",
    "fuel-parallel",
    "fuel-pyo3",
    "fuel-quantized",
    "fuel-transformers",
    "fuel-training",
    "fuel-ug",
    "fuel-wasm-examples/*",
    "fuel-wasm-tests",
]
resolver = "2"

[workspace.package]
version = "0.10.3"
edition = "2024"
description = "Minimalist ML framework."
repository = "https://github.com/ciresnave/fuel"
keywords = ["blas", "tensor", "machine-learning"]
categories = ["science"]
license = "MIT OR Apache-2.0"

[workspace.dependencies]
ab_glyph = "0.2.23"
accelerate-src = { version = "0.3.2" }
# AOCL: AMD CPU BLAS wrappers (github.com/ciresnave/aocl), published on
# crates.io. Switched from the out-of-tree path dep to crates.io 2026-06-13
# so a clean clone builds without the sibling checkout. Fuel's surface is
# tiny and stable across 0.1.x (aocl_blas::gemm + aocl_types::Trans::No).
# NOTE: building fuel-aocl-cpu-backend still needs a libclang for bindgen +
# AMD's AOCL install for the prebuilt BLIS lib — those are runtime/build
# prerequisites, independent of where the Rust wrapper crate comes from.
aocl-blas  = "0.1"
aocl-types = "0.1"
# Intel oneMKL safe wrapper for the Phase 7b second CPU backend.
# Crates.io release 0.2.0 (2026-05-15) — adds service module
