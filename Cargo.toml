fuel-dispatch = { path = "./fuel-dispatch", version = "0.10.3" }
fuel-vulkan-backend = { path = "./fuel-vulkan-backend", version = "0.10.3" }
fuel-kernels-source = { path = "./fuel-kernels-source", version = "0.10.3" }
fuel-vulkan-kernels = { path = "./fuel-vulkan-kernels", version = "0.10.3" }
fuel-datasets = { path = "./fuel-datasets", version = "0.10.3" }
fuel-formats = { path = "./fuel-formats", version = "0.10.3" }
fuel-inference = { path = "./fuel-inference", version = "0.10.3" }
fuel-metal-backend = { path = "./fuel-metal-backend", version = "0.10.3" }
fuel-metal-kernels = { path = "./fuel-metal-kernels", version = "0.10.3" }
fuel-onnx = { path = "./fuel-onnx", version = "0.10.3" }
