[package]
    categories.workspace = true
    description          = "Vulkan GPU executor for the fuel lazy-graph layer. Uses Vulkane for device management and precompiled SPIR-V from fuel-vulkan-kernels (sources in fuel-kernels-source)."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-graph-vulkan"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel-conv              = { workspace = true }
    fuel-core-types        = { workspace = true }
    fuel-graph             = { workspace = true }
    fuel-graph-executor    = { workspace = true }
    fuel-reference-backend = { workspace = true }
    # Precompiled SPIR-V kernels. Sources live in fuel-kernels-source
    # and are compiled ahead of time (see
    # `fuel-kernels-source/kernels/compile.sh`) — vulkane does NOT
    # need its naga / shaderc / slang features at build or run time.
    # Fuel stays toolchain-free for downstream consumers.
    fuel-vulkan-kernels    = { workspace = true }
    half                   = { workspace = true }
    memmap2                = { workspace = true }
    tracing                = { workspace = true }
    # Local path during 0.7 integration; will flip back to a crates.io
    # version once we've validated the new budget / defrag APIs against
    # the live workspace. Vulkane 0.7.0 adds:
    #   - vram_budget() / vram_used() — VK_EXT_memory_budget proxy
    #   - register_pressure_callback(threshold, hysteresis, cb)
    #   - would_fit(size, memory_type) -> FitStatus (predictive)
    #   - build_defragmentation_plan / apply_defragmentation_plan
    vulkane                = { path = "../../vulkane/vulkane" }

[dev-dependencies]
    fuel-conv      = { workspace = true }
    fuel-graph-cpu = { workspace = true }
    fuel-core      = { path = "../fuel-core", features = ["vulkan"] }
