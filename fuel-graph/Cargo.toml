[package]
    categories.workspace = true
    description          = "Lazy computation graph for the fuel ML framework (Phase 6). Hardware-agnostic Tensor handles, an Op enum, and a Graph arena."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-graph"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    float8                 = { workspace = true }
    fuel-ir                = { workspace = true }
    fuel-backend-contract  = { workspace = true }
    fuel-kernel-seam-types = { workspace = true }
    half                   = { workspace = true }

[dev-dependencies]
    # Phase 7.5 G2: tests construct a CPU device via fuel-cpu-backend's
    # CpuBackendDevice so the slot-populating constructors have an
    # Arc<dyn DynBackendDevice> to allocate against.
    fuel-cpu-backend = { workspace = true }
