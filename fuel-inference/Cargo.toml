[package]
    categories.workspace = true
    description          = "Inference orchestration layer for the Fuel ML framework."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-inference"
    readme               = "README.md"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel              = { workspace = true }
    fuel-transformers = { workspace = true }
    # Phase 6d Track 4: scheduler-bridge biases graph placement from
    # runtime memory-pressure state. Direction: fuel-inference
    # (high-level orchestration) drives the planner, not the reverse.
    # (fuel-graph-router retired with executor-unification Session 6;
    # the bridge is self-contained over fuel-graph types.)
    fuel-graph             = { workspace = true }
    fuel-ir        = { workspace = true }
    rand                = { workspace = true }
    serde               = { workspace = true }
    serde_json          = { workspace = true }
    tracing             = { workspace = true }

[dev-dependencies]
    # Phase 7.5 G2: tests need a CpuBackendDevice handle for
    # slot-populating constructors (cpu_dev() helper).
    fuel-cpu-backend = { workspace = true }

[features]
    accelerate = ["fuel-transformers/accelerate", "fuel/accelerate"]
    cuda       = ["fuel-transformers/cuda", "fuel/cuda"]
    cudnn      = ["fuel-transformers/cudnn", "fuel/cudnn"]
    default    = []
    metal      = ["fuel-transformers/metal", "fuel/metal"]
    mkl        = ["fuel-transformers/mkl", "fuel/mkl"]
