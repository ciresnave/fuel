[package]
    categories.workspace = true
    description          = "Inference orchestration layer for the Fuel ML framework."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-inference"
    readme               = "README.md"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel              = { workspace = true }
    fuel-transformers = { workspace = true }
    # Phase 6d Track 4: scheduler-bridge needs the lazy-graph planner
    # surface (SchedulerRule trait, Placement, Router). Direction:
    # fuel-inference (high-level orchestration) drives the planner,
    # not the reverse.
    fuel-graph             = { workspace = true }
    fuel-graph-router      = { workspace = true }
    fuel-core-types        = { workspace = true }
    rand                = { workspace = true }
    serde               = { workspace = true }
    serde_json          = { workspace = true }
    tracing             = { workspace = true }

[features]
    accelerate = ["fuel-transformers/accelerate", "fuel/accelerate"]
    cuda       = ["fuel-transformers/cuda", "fuel/cuda"]
    cudnn      = ["fuel-transformers/cudnn", "fuel/cudnn"]
    default    = []
    metal      = ["fuel-transformers/metal", "fuel/metal"]
    mkl        = ["fuel-transformers/mkl", "fuel/mkl"]
