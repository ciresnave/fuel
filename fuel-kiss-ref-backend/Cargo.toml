[package]
name = "fuel-kiss-ref-backend"
version = "0.1.0"
edition = "2024"
description = "CPU, never-panic adapter exposing kiss-ref-core as Fuel's primitive-floor reference / differential target (correctness only; no fusion, no GPU)."

[dependencies]
fuel-ir = { path = "../fuel-ir" }
fuel-kernel-seam-types = { path = "../fuel-kernel-seam-types" }
half = { workspace = true }
# kiss-ref (private, github.com/ThinkersJournal/kiss-ref) — all three crates from
# the one workspace repo at a pinned rev. Bump the rev in lockstep. crates.io is
# deliberately NOT used until kiss-ref is public-ready.
kiss-ref-core       = { git = "https://github.com/ThinkersJournal/kiss-ref", rev = "b75a748f772d8a4e87b3993430f3b33d593b9eee" }
kiss-ops-vocab      = { git = "https://github.com/ThinkersJournal/kiss-ref", rev = "b75a748f772d8a4e87b3993430f3b33d593b9eee" }
kiss-classify-vocab = { git = "https://github.com/ThinkersJournal/kiss-ref", rev = "b75a748f772d8a4e87b3993430f3b33d593b9eee" }
