[package]
    categories.workspace = true
    description          = "Runnable binaries demonstrating fuel's Phase 6a lazy graph layer. Kept separate from fuel-examples so it does not pull in the eager-path model code in fuel-transformers / fuel-nn."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-lazy-examples"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel = { workspace = true }
    fuel-core-types = { workspace = true }
    fuel-graph = { workspace = true }
    fuel-cuda-backend = { workspace = true, optional = true }
    fuel-graph-executor = { workspace = true }
    fuel-graph-vulkan = { workspace = true, optional = true }
    hf-hub = { workspace = true }
    tracing = { workspace = true }
    tracing-chrome = { workspace = true }
    tracing-subscriber = { workspace = true }

[features]
    default = []
    cuda = ["fuel/cuda", "dep:fuel-cuda-backend"]
    vulkan = ["fuel/vulkan", "dep:fuel-graph-vulkan"]
