[package]
    categories.workspace = true
    description          = "Metal backend for the fuel ML framework"
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-metal-backend"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel-ir  = { workspace = true }
    fuel-backend-contract = { workspace = true }
    fuel-cpu-backend = { workspace = true }
    fuel-quantized   = { workspace = true }
    half              = { workspace = true }
    num-traits        = { workspace = true }
    thiserror         = { workspace = true }

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
    fuel-metal-kernels = { workspace = true }
    objc2-foundation     = { workspace = true }
    objc2-metal          = { workspace = true }

[features]
    default = []
    ug      = ["dep:fuel-ug"]

[target.'cfg(all(any(target_os = "macos", target_os = "ios"), not(target_arch = "wasm32")))'.dependencies]
    fuel-ug = { workspace = true, optional = true }
