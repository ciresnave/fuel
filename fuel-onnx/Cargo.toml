[package]
name = "fuel-onnx"
version = "0.10.2"
edition = "2021"

description = "ONNX support for Fuel"
repository = "https://github.com/huggingface/fuel"
keywords = ["blas", "tensor", "machine-learning"]
categories = ["science"]
license = "MIT OR Apache-2.0"

[dependencies]
fuel = { path = "../fuel-core", package = "fuel-core", version = "0.10.2" }
fuel-nn = { path = "../fuel-nn", version = "0.10.2" }
prost = "0.14.1"

[build-dependencies]
prost-build = "0.14.1"

[dev-dependencies]
anyhow = { version = "1", features = ["backtrace"] }
clap = { version = "4.5.49", features = ["derive"] }
