[package]
    categories.workspace = true
    description          = "Correctness oracle for the fuel ML framework. Pure-Rust reference implementations of tensor operations, used only for validation, never for production."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-reference-backend"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel-conv       = { workspace = true }
    fuel-ir = { workspace = true }
    fuel-graph      = { workspace = true }
    half            = { workspace = true }
    libm            = { workspace = true }
    num-traits      = { workspace = true }

[dev-dependencies]
    # Phase 7.5 G2: tests need a CpuBackendDevice handle for
    # slot-populating constructors (cpu_dev() helper).
    fuel-cpu-backend = { workspace = true }

# The reference backend uses `num_traits::PrimInt` as the bound for index
# tensors (gather/scatter etc.). Float ops use `num_traits::Float`.
