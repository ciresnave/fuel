[package]
categories.workspace = true
description = "Unified storage abstraction for fuel: byte-shaped Storage owning bytes + dtype + backend memory region. Closed enum over CPU/CUDA/Vulkan/Metal variants. Backends provide kernels against these types; backends do not own their own storage type."
edition.workspace = true
keywords.workspace = true
license.workspace = true
name = "fuel-storage"
repository.workspace = true
version.workspace = true

[dependencies]
fuel-core-types = { workspace = true }
fuel-cpu-backend = { workspace = true }
fuel-cuda-backend = { workspace = true, optional = true }
fuel-graph = { workspace = true }
fuel-vulkan-backend = { workspace = true, optional = true }
bytemuck = { workspace = true }
half = { workspace = true }
smallvec = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
fuel-metal-backend = { workspace = true, optional = true }

[dev-dependencies]
# QMatMul tests construct Q4_0 weight blocks directly.
fuel-quantized = { workspace = true }

[features]
default = []
# Per-backend storage variants. A3.1 wired Metal via
# fuel-metal-backend (target-gated to Apple platforms);
# A3.2 wired CUDA via fuel-cuda-backend;
# A3.3 wires Vulkan via fuel-vulkan-backend.
cuda = ["dep:fuel-cuda-backend"]
vulkan = ["dep:fuel-vulkan-backend"]
metal = ["dep:fuel-metal-backend"]
