[package]
name = "fuel-transformers"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
readme = "README.md"

[dependencies]
accelerate-src = { workspace = true, optional = true }
byteorder = { workspace = true }
fuel = { workspace = true }
fuel-cpu-backend = { workspace = true }
fuel-flash-attn-cuda = { workspace = true, optional = true }
fancy-regex = { workspace = true }
intel-mkl-src = { workspace = true, optional = true }
num-traits = { workspace = true }
rand = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_plain = { workspace = true }
tracing = { workspace = true }

[features]
default = []
accelerate = ["dep:accelerate-src", "fuel/accelerate"]
cuda = ["fuel/cuda"]
cudnn = ["fuel/cudnn"]
flash-attn = ["cuda", "dep:fuel-flash-attn-cuda"]
mkl = ["dep:intel-mkl-src", "fuel/mkl"]
metal = ["fuel/metal"]
