[package]
name = "fuel-transformers"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
readme = "README.md"

[dependencies]
accelerate-src = { workspace = true, optional = true }
byteorder = { workspace = true }
fuel = { workspace = true }
fuel-flash-attn = { workspace = true, optional = true }
fuel-nn = { workspace = true }
fancy-regex = { workspace = true }
intel-mkl-src = { workspace = true, optional = true }
num-traits = { workspace = true }
rand = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_plain = { workspace = true }
tracing = { workspace = true }

[features]
default = []
accelerate = ["dep:accelerate-src", "fuel/accelerate", "fuel-nn/accelerate"]
cuda = ["fuel/cuda", "fuel-nn/cuda"]
cudnn = ["fuel/cudnn", "fuel-nn/cudnn"]
flash-attn = ["cuda", "dep:fuel-flash-attn"]
mkl = ["dep:intel-mkl-src", "fuel/mkl", "fuel-nn/mkl"]
metal = ["fuel/metal", "fuel-nn/metal"]
