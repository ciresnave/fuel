[package]
    categories.workspace = true
    description          = "Vulkan GPU executor for the fuel lazy-graph layer. Uses Vulkane for device management and precompiled SPIR-V from fuel-vulkan-kernels (sources in fuel-kernels-source)."
    edition.workspace    = true
    keywords.workspace   = true
    license.workspace    = true
    name                 = "fuel-vulkan-backend"
    repository.workspace = true
    version.workspace    = true

[dependencies]
    fuel-conv              = { workspace = true }
    fuel-core-types        = { workspace = true }
    fuel-graph             = { workspace = true }
    # Precompiled SPIR-V kernels. Sources live in fuel-kernels-source
    # and are compiled ahead of time (see
    # `fuel-kernels-source/kernels/compile.sh`) — vulkane does NOT
    # need its naga / shaderc / slang features at build or run time.
    # Fuel stays toolchain-free for downstream consumers.
    fuel-vulkan-kernels    = { workspace = true }
    half                   = { workspace = true }
    memmap2                = { workspace = true }
    tracing                = { workspace = true }
    # Flipped from the local path dep back to crates.io 2026-06-13: the
    # 0.7 budget/defrag APIs (vram_budget/vram_used, register_pressure_callback,
    # would_fit -> FitStatus, build/apply_defragmentation_plan) are validated
    # and published; local checkout was 0.8.1 == crates.io 0.8.1. crates.io
    # version so a clean clone builds without the ../vulkane sibling checkout.
    vulkane                = "0.8.1"

[dev-dependencies]
    fuel-conv      = { workspace = true }
    fuel-core      = { path = "../fuel-core", features = ["vulkan"] }
    # Phase 7.5 G2: tests need a CpuBackendDevice handle for
    # slot-populating constructors (cpu_dev() helper).
    fuel-cpu-backend = { workspace = true }
