[package]
name = "fuel-wasm-example-blip"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[dependencies]
# `fuel` is the workspace alias for `fuel-core` (see root Cargo.toml:
# `fuel = { path = "./fuel-core", package = "fuel-core" }`). It exposes
# `fuel_core::lazy_blip` / `lazy_blip_text` / `lazy_blip_vision`.
fuel = { workspace = true }
# fuel-transformers is still needed for `generation::LogitsProcessor`.
fuel-transformers = { workspace = true }
tokenizers = { workspace = true, features = ["unstable_wasm"] }
num-traits = { workspace = true }

# App crates.
anyhow = { workspace = true }
byteorder = { workspace = true }
getrandom = { version = "0.2", features = ["js"] }
half = { workspace = true }
image = { workspace = true }
log = { workspace = true }
safetensors = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Wasm specific crates.
console_error_panic_hook = "0.1.7"
wasm-bindgen = "0.2.87"
js-sys = "0.3.64"
