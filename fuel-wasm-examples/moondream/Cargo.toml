[package]
name = "fuel-wasm-example-moondream"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true

[dependencies]
fuel = { workspace = true }
# fuel-nn dropped 2026-06-07: migrated off retired eager VarBuilder/ops onto
# lazy substrate (`fuel::lazy_moondream`).
fuel-transformers = { workspace = true } # generation::LogitsProcessor + utils::apply_repeat_penalty (non-models surfaces still live)
tokenizers = { workspace = true, features = ["unstable_wasm"] }
num-traits = { workspace = true }

# App crates.
anyhow = { workspace = true }
byteorder = { workspace = true }
getrandom = { version = "0.2", features = ["js"] }
image = { workspace = true }
log = { workspace = true }
safetensors = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Wasm specific crates.
console_error_panic_hook = "0.1.7"
wasm-bindgen = "0.2.87"
js-sys = "0.3.64"
serde-wasm-bindgen = "0.6.5"
